<?xml version="1.0" encoding="UTF-8"?>
<!-- Honour medal — laurel-wreathed disc. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="honour" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2d48a"/>
      <stop offset="100%" stop-color="#b8924a"/>
    </linearGradient>
  </defs>
  <!-- Laurel wreath -->
  <g fill="#8a6a2f" opacity="0.7">
    <ellipse cx="20" cy="50" rx="3" ry="6" transform="rotate(-30 20 50)"/>
    <ellipse cx="22" cy="36" rx="3" ry="6" transform="rotate(-50 22 36)"/>
    <ellipse cx="30" cy="22" rx="3" ry="6" transform="rotate(-70 30 22)"/>
    <ellipse cx="80" cy="50" rx="3" ry="6" transform="rotate(30 80 50)"/>
    <ellipse cx="78" cy="36" rx="3" ry="6" transform="rotate(50 78 36)"/>
    <ellipse cx="70" cy="22" rx="3" ry="6" transform="rotate(70 70 22)"/>
    <ellipse cx="22" cy="64" rx="3" ry="6" transform="rotate(30 22 64)"/>
    <ellipse cx="30" cy="78" rx="3" ry="6" transform="rotate(50 30 78)"/>
    <ellipse cx="78" cy="64" rx="3" ry="6" transform="rotate(-30 78 64)"/>
    <ellipse cx="70" cy="78" rx="3" ry="6" transform="rotate(-50 70 78)"/>
  </g>
  <!-- Medal -->
  <circle cx="50" cy="50" r="28" fill="url(#honour)" stroke="#8a6a2f" stroke-width="1"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#8a6a2f" stroke-width="0.5" opacity="0.5"/>
  <!-- Centre seal -->
  <text x="50" y="58" text-anchor="middle" fill="#8a6a2f" font-family="Cormorant Garamond, Times New Roman, serif" font-size="22" font-weight="600">M</text>
</svg>
