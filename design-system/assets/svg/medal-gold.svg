<?xml version="1.0" encoding="UTF-8"?>
<!-- Award medal — gold gradient. Used in awards crown cards. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0e6ce"/>
      <stop offset="50%" stop-color="#d4ae6b"/>
      <stop offset="100%" stop-color="#8a6a2f"/>
    </linearGradient>
  </defs>
  <!-- Ribbon -->
  <path d="M 30 8 L 50 50 L 70 8 Z" fill="#a43a2a" opacity="0.85"/>
  <path d="M 30 8 L 50 50 L 40 25 Z" fill="#7a2a1c"/>
  <!-- Medal disc -->
  <circle cx="50" cy="62" r="32" fill="url(#gold)" stroke="#8a6a2f" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="50" cy="62" r="24" fill="none" stroke="#8a6a2f" stroke-width="0.6" opacity="0.5"/>
  <!-- Star centre -->
  <path d="M 50 46 L 53 58 L 65 58 L 55 65 L 59 77 L 50 70 L 41 77 L 45 65 L 35 58 L 47 58 Z" fill="#8a6a2f" opacity="0.8"/>
</svg>
