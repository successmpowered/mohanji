<?xml version="1.0" encoding="UTF-8"?>
<!-- Vertical-gold divider — 90px tall, fades at top and bottom. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 90" width="1" height="90">
  <defs>
    <linearGradient id="rule" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#b8924a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b8924a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b8924a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1" height="90" fill="url(#rule)"/>
</svg>
